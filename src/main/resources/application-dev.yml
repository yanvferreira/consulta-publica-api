# spring.application.name=consulta
spring:    
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        jdbc:
          fetch_size: 100
        default_batch_fetch_size: 100

logging:
  level:
    root: INFO

